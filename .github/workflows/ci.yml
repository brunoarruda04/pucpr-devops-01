name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.0'
          bundler-cache: true

      - name: Rodar linter (RuboCop)
        run: bundle exec rubocop

      - name: Teste simples
        run: ruby -e "puts 'CI OK'"